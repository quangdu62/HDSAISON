<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vay Tiêu Dùng</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    background:white;
    padding:30px 20px;
    border-radius:16px;
    margin-top:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    color:#dc2626;
    margin-bottom:5px;
}

.limit{
    font-weight:bold;
    color:#111827;
    margin-bottom:20px;
}

ul{
    text-align:left;
    padding-left:20px;
    font-size:14px;
    margin-bottom:25px;
}

li{
    margin-bottom:6px;
}

.name{
    font-size:18px;
    font-weight:bold;
    margin-top:15px;
}

.phone{
    color:#dc2626;
    font-weight:bold;
    margin-bottom:15px;
}

.button{
    display:block;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    margin:10px 0;
}

.call{
    background:#16a34a;
    color:white;
}

.zalo{
    background:#0068ff;
    color:white;
}

.zalo img{
    width:18px;
    vertical-align:middle;
    margin-right:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>VAY TIÊU DÙNG – TRẢ GÓP XE MÁY</h2>
<div class="limit">HẠN MỨC TỪ 10 TRIỆU – 200 TRIỆU</div>

<ul>
<li>✔ Chỉ cần CCCD</li>
<li>✔ Không mất phí hồ sơ</li>
<li>✔ Không thẩm định nhà</li>
<li>✔ Giải ngân 24/7</li>
</ul>

<div class="name" id="name">Tên Nhân Viên</div>
<div class="phone" id="phone">0900000000</div>

<a id="callBtn" class="button call">📞 Gọi ngay</a>

<a id="zaloBtn" class="button zalo">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
Nhận tư vấn qua Zalo
</a>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const phone = params.get("phone");

if(name) document.getElementById("name").innerText = name;
if(phone){
    document.getElementById("phone").innerText = phone;
    document.getElementById("callBtn").href = "tel:" + phone;
    document.getElementById("zaloBtn").href = "https://zalo.me/" + phone;
}
</script>

</body>
</html>
